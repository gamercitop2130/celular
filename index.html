<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartinTech - Version Celular</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding-top: 10vh; 
            margin: 0; 
        }
        .card { 
            background: #161b22; 
            padding: 30px; 
            border-radius: 25px; 
            display: inline-block; 
            border: 2px solid #58a6ff; 
            width: 90%; 
            max-width: 420px; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.8); 
        }
        h1 { color: #58a6ff; font-size: 26px; margin-bottom: 5px; text-transform: uppercase; }
        .status { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        
        input { 
            font-size: 32px; width: 80%; padding: 12px; text-align: center; 
            border-radius: 12px; border: 2px solid #30363d; background: #0d1117; 
            color: white; margin-bottom: 20px; outline: none; 
        }

        /* ESTILO PARA EL MENSAJE DE ERROR INTERNO */
        #msgError {
            color: #ff7b72;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none; /* Escondido hasta que haya bardo */
            font-weight: bold;
            font-size: 14px;
        }

        .btn-validar { 
            background: #238636; color: white; padding: 18px; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 20px; 
            cursor: pointer; width: 88%; 
        }

        #downloadArea { display: none; margin-top: 25px; border-top: 1px solid #30363d; padding-top: 25px; }
        .btn-link { 
            color: white; text-decoration: none; padding: 18px; display: block; 
            border-radius: 15px; font-weight: bold; font-size: 18px; margin-bottom: 15px; 
        }
        .pelis { background-color: #e11d48; } 
        .tv-futbol { background-color: #2563eb; } 
        
        .footer { margin-top: 25px; color: #8b949e; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>DESCARGAR APP PARA VER TV Y PELICULAS!</h1>
        <div class="status" id="status">Vea sus programas de TV y peliculas favoritas en tan solo 2 clicks!</div>
        
        <div id="loginArea">
            <input type="number" id="pinInput" placeholder="PIN" pattern="\d*">
            
            <div id="msgError"></div>

            <button class="btn-validar" id="btnValidar" onclick="validarAcceso()">INGRESAR</button>
        </div>

        <div id="downloadArea">
            <p style="color: #3fb950; font-weight: bold; margin-bottom: 20px;">✅ ACCESO CONCEDIDO</p>
            <a href="https://movieplusapk.app/MoviePlus12cel.apk" class="btn-link pelis">🎬 PELICULAS (Celular)</a>
            <a href="https://content.kirasphere.com/storage/tv-phones.apk?v=0.0.4" class="btn-link tv-futbol">⚽ TELEVISIÒN (TV y Fútbol)</a>
        </div>

        <div class="footer">(PD: Los canales de TV pueden ser afectados negativamente, de ser asi avisar)</div>
    </div>

    <script>
        async function validarAcceso() {
            const btn = document.getElementById("btnValidar");
            const pinInput = document.getElementById("pinInput");
            const errorArea = document.getElementById("msgError");
            const pinUsuario = pinInput.value;

            // Reset de errores
            errorArea.style.display = "none";
            errorArea.innerText = "";

            if(!pinUsuario) { 
                errorArea.innerText = "❌ Por favor, ingresá el PIN.";
                errorArea.style.display = "block";
                return; 
            }
            
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const urlRaw = "https://pastebin.com/raw/e39RhLdn";
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(urlRaw + '?t=' + Date.now())}`;

            try {
                const response = await fetch(proxyUrl);
                const text = await response.text();
                const codigosValidos = text.split('\n').map(c => c.trim());

                if (codigosValidos.includes(pinUsuario.trim())) {
                    document.getElementById("downloadArea").style.display = "block";
                    document.getElementById("loginArea").style.display = "none";
                    document.getElementById("status").innerText = "Sesión validada para móvil";
                } else {
                    // PIN INCORRECTO EN PANTALLA
                    errorArea.innerText = "❌ PIN INCORRECTO";
                    errorArea.style.display = "block";
                    btn.innerText = "INGRESAR";
                    btn.disabled = false;
                    pinInput.value = ""; // Limpiamos para el próximo intento
                }
            } catch (error) {
                errorArea.innerText = "⚠️ ERROR DE CONEXIÓN";
                errorArea.style.display = "block";
                btn.innerText = "REINTENTAR";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
